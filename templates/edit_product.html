<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать продукт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>

<body>
    <main class="container admin-shell px-3 px-md-4 py-4" style="max-width: 600px;">
        <div class="card">
            <div class="card-header py-3">
                <h1 class="h5 mb-0">Редактировать продукт</h1>
            </div>
            <div class="card-body p-4">
                <form action="/admin/products/{{ product.id }}/edit" method="post" class="vstack gap-3">
                    <div>
                        <label for="product_name" class="form-label">Наименование продукта</label>
                        <input type="text" id="product_name" name="product_name" class="form-control"
                            value="{{ product.product_name }}" required>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/admin" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
