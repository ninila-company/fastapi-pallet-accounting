<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет паллет на СВХ</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">
    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h1 class="h2 mb-0">Учет паллет</h1>
            <div class="d-flex gap-2 flex-wrap">
                <div class="d-flex align-items-center gap-3" id="print-controls" style="display: none;">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="select-all-checkbox">
                        <label class="form-check-label" for="select-all-checkbox">Выбрать все</label>
                    </div>
                    <button type="submit" class="btn btn-success" id="print-selected-btn" disabled>🖨️ Печать</button>
                </div>
                <a href="/admin" class="btn btn-outline-secondary">Админ-панель</a>
            </div>
        </div>

        <!-- Навигация по вкладкам -->
        <ul class="nav nav-tabs" id="palletTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="in-stock-tab" data-bs-toggle="tab" data-bs-target="#in-stock"
                    type="button" role="tab" aria-controls="in-stock" aria-selected="true">
                    На складе <span class="badge bg-secondary">{{ pallets_in_stock | length }}</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="in-transit-tab" data-bs-toggle="tab" data-bs-target="#in-transit"
                    type="button" role="tab" aria-controls="in-transit" aria-selected="false">
                    В пути <span class="badge bg-primary">{{ pallets_in_transit | length }}</span>
                </button>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/received">
                    Посмотреть полученные <span class="badge bg-success">{{ received_count }}</span>
                </a>
            </li>
        </ul>

        <!-- Контент вкладок -->
        <div class="tab-content pt-4" id="palletTabsContent">
            <!-- ВКЛАДКА "НА СКЛАДЕ" -->
            <div class="tab-pane fade show active" id="in-stock" role="tabpanel" aria-labelledby="in-stock-tab">
                <form id="print-form-in-stock" action="/download-pallets-pdf" method="get" target="_blank">
                    {% with pallets=pallets_in_stock, tab_id='in-stock' %}
                    {% include 'pallet_cards.html' %}
                    {% endwith %}
                </form>
            </div>

            <!-- ВКЛАДКА "В ПУТИ" -->
            <div class="tab-pane fade" id="in-transit" role="tabpanel" aria-labelledby="in-transit-tab">
                <form id="print-form-in-transit" action="/download-pallets-pdf" method="get" target="_blank">
                    {% with pallets=pallets_in_transit, tab_id='in-transit' %}
                    {% include 'pallet_cards.html' %}
                    {% endwith %}
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- Логика для кнопок "Отправить в YouGile" ---
            document.querySelectorAll('.yougile-send-btn').forEach(button => {
                button.addEventListener('click', function (event) {
                    event.preventDefault();
                    const palletId = this.dataset.palletId;
                    const palletNumber = this.dataset.palletNumber;

                    if (confirm(`Вы уверены, что хотите пометить паллет №${palletNumber} как "Заказан"?`)) {
                        fetch(`/pallets/${palletId}/order`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                            .then(response => {
                                if (response.ok) {
                                    alert(`Паллет №${palletNumber} помечен как "Заказан" и перемещен во вкладку "В пути".`);
                                    window.location.reload(); // Перезагружаем страницу для обновления списков
                                } else {
                                    response.json().then(data => {
                                        alert(`Ошибка: ${data.detail || 'Не удалось обновить паллет.'}`);
                                    });
                                }
                            })
                            .catch(error => {
                                console.error('Fetch Error:', error);
                                alert('Произошла ошибка при отправке запроса.');
                            });
                    }
                });
            });

            // --- Логика для вкладок и печати ---
            const printControls = document.getElementById('print-controls');
            const selectAllCheckbox = document.getElementById('select-all-checkbox');
            const printBtn = document.getElementById('print-selected-btn');
            const tabs = document.querySelectorAll('#palletTabs button[data-bs-toggle="tab"]');

            function setupPrintingForTab(tabId) {
                const currentTabPane = document.getElementById(tabId);
                if (!currentTabPane) return;

                const checkboxes = currentTabPane.querySelectorAll('.pallet-checkbox');
                const hasPallets = checkboxes.length > 0;

                printControls.style.display = hasPallets ? 'flex' : 'none';
                if (!hasPallets) return;

                const printForm = document.getElementById(`print-form-${tabId}`);
                printBtn.setAttribute('form', `print-form-${tabId}`);

                function togglePrintButton() {
                    const selectedCount = currentTabPane.querySelectorAll('.pallet-checkbox:checked').length;
                    printBtn.disabled = selectedCount === 0;

                    if (selectedCount === checkboxes.length && checkboxes.length > 0) {
                        selectAllCheckbox.checked = true;
                        selectAllCheckbox.indeterminate = false;
                    } else if (selectedCount > 0) {
                        selectAllCheckbox.checked = false;
                        selectAllCheckbox.indeterminate = true;
                    } else {
                        selectAllCheckbox.checked = false;
                        selectAllCheckbox.indeterminate = false;
                    }
                }

                checkboxes.forEach(checkbox => {
                    checkbox.removeEventListener('change', togglePrintButton); // Убираем старые обработчики
                    checkbox.addEventListener('change', togglePrintButton);
                });

                selectAllCheckbox.removeEventListener('change', selectAllHandler); // Убираем старые обработчики
                selectAllCheckbox.addEventListener('change', selectAllHandler);

                function selectAllHandler() {
                    checkboxes.forEach(cb => cb.checked = this.checked);
                    togglePrintButton();
                }

                togglePrintButton();
            }

            // Настройка при переключении вкладок
            tabs.forEach(tabEl => {
                tabEl.addEventListener('show.bs.tab', function (event) {
                    const tabId = event.target.getAttribute('aria-controls');
                    localStorage.setItem('activePalletTab', tabId);
                    setupPrintingForTab(tabId);
                });
            });

            // Настройка при загрузке страницы
            const activeTab = localStorage.getItem('activePalletTab');
            const activeTabId = activeTab || 'in-stock';

            const someTabTriggerEl = document.querySelector(`button[data-bs-target="#${activeTabId}"]`);
            if (someTabTriggerEl) {
                const tab = new bootstrap.Tab(someTabTriggerEl);
                tab.show();
                setupPrintingForTab(activeTabId);
            } else {
                setupPrintingForTab('in-stock'); // Fallback
            }
        });
    </script>
</body>

</html>
